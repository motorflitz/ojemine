<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt - mediaMW</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
      font-size: 1.8rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #555;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e1e5e9;
      border-radius: 5px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .error {
      color: #e74c3c;
      font-size: 0.875rem;
      margin-top: 0.25rem;
      display: none;
    }

    .input-error {
      border-color: #e74c3c;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 1rem;
      color: #667eea;
    }

    .message {
      padding: 1rem;
      border-radius: 5px;
      margin-bottom: 1rem;
      display: none;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .char-count {
      font-size: 0.75rem;
      color: #666;
      text-align: right;
      margin-top: 0.25rem;
    }

    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
        margin: 10px;
      }

      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kontaktformular</h1>

    <div id="message" class="message"></div>

    <form id="contactForm" method="POST" action="/api/send">
      <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required maxlength="100" />
        <div class="error" id="nameError"></div>
      </div>

      <div class="form-group">
        <label for="email">E-Mail-Adresse *</label>
        <input type="email" id="email" name="email" required />
        <div class="error" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="message">Nachricht *</label>
        <textarea id="message" name="message" required maxlength="5000" placeholder="Ihre Nachricht..."></textarea>
        <div class="char-count">
          <span id="charCount">0</span>/5000 Zeichen
        </div>
        <div class="error" id="messageError"></div>
      </div>

      <button type="submit" id="submitBtn">
        <span id="submitText">Nachricht senden</span>
      </button>
    </form>

    <div class="loading" id="loading">
      <p>Nachricht wird gesendet...</p>
    </div>
  </div>

  <script>
    // DOM-Elemente
    const form = document.getElementById('contactForm');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const loading = document.getElementById('loading');
    const messageDiv = document.getElementById('message');
    const charCount = document.getElementById('charCount');
    const messageTextarea = document.getElementById('message');

    // Zeichenzähler
    messageTextarea.addEventListener('input', function() {
      const count = this.value.length;
      charCount.textContent = count;

      if (count > 4800) {
        charCount.style.color = '#e74c3c';
      } else if (count > 4500) {
        charCount.style.color = '#f39c12';
      } else {
        charCount.style.color = '#666';
      }
    });

    // Echtzeit-Validierung
    function validateField(field, errorElement, validator) {
      const value = field.value.trim();
      const error = validator(value);

      if (error) {
        field.classList.add('input-error');
        errorElement.textContent = error;
        errorElement.style.display = 'block';
        return false;
      } else {
        field.classList.remove('input-error');
        errorElement.style.display = 'none';
        return true;
      }
    }

    // Validatoren
    const validators = {
      name: (value) => {
        if (!value) return 'Name ist erforderlich';
        if (value.length > 100) return 'Name darf maximal 100 Zeichen lang sein';
        return null;
      },
      email: (value) => {
        if (!value) return 'E-Mail ist erforderlich';
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(value)) return 'Ungültige E-Mail-Adresse';
        return null;
      },
      message: (value) => {
        if (!value) return 'Nachricht ist erforderlich';
        if (value.length > 5000) return 'Nachricht darf maximal 5000 Zeichen lang sein';
        return null;
      }
    };

    // Event-Listener für Echtzeit-Validierung
    document.getElementById('name').addEventListener('blur', function() {
      validateField(this, document.getElementById('nameError'), validators.name);
    });

    document.getElementById('email').addEventListener('blur', function() {
      validateField(this, document.getElementById('emailError'), validators.email);
    });

    messageTextarea.addEventListener('blur', function() {
      validateField(this, document.getElementById('messageError'), validators.message);
    });

    // Nachricht anzeigen
    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
      messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Formular-Submit
    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      // Alle Felder validieren
      const nameValid = validateField(
        document.getElementById('name'),
        document.getElementById('nameError'),
        validators.name
      );
      const emailValid = validateField(
        document.getElementById('email'),
        document.getElementById('emailError'),
        validators.email
      );
      const messageValid = validateField(
        messageTextarea,
        document.getElementById('messageError'),
        validators.message
      );

      if (!nameValid || !emailValid || !messageValid) {
        showMessage('Bitte korrigieren Sie die Fehler im Formular.', 'error');
        return;
      }

      // Loading-State
      submitBtn.disabled = true;
      submitText.textContent = 'Wird gesendet...';
      loading.style.display = 'block';
      messageDiv.style.display = 'none';

      try {
        const formData = new FormData(form);
        const response = await fetch('/api/send', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (response.ok && result.success) {
          showMessage('Vielen Dank! Ihre Nachricht wurde erfolgreich gesendet.', 'success');
          form.reset();
          charCount.textContent = '0';
        } else {
          const errorMsg = result.details ?
            result.details.join(', ') :
            (result.error || 'Ein Fehler ist aufgetreten');
          showMessage(`Fehler: ${errorMsg}`, 'error');
        }
      } catch (error) {
        console.error('Fehler beim Senden:', error);
        showMessage('Netzwerkfehler. Bitte versuchen Sie es später erneut.', 'error');
      } finally {
        // Loading-State zurücksetzen
        submitBtn.disabled = false;
        submitText.textContent = 'Nachricht senden';
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
